name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-lane:
    name: Fast Lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            go.sum
            go.mod

      - name: Run fast test suite
        run: go test ./...

      - name: Validate generator surface
        run: go run ./cmd/fiberx validate

      - name: Doctor generator surface
        run: go run ./cmd/fiberx doctor
